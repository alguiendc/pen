<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Pen Touch Detection</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      color: #eee;
      font-family: monospace;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Debug bar ─────────────────────────────────────────── */
    #debug {
      background: #16213e;
      padding: 8px 14px;
      display: flex;
      gap: 18px;
      align-items: center;
      flex-wrap: wrap;
      border-bottom: 2px solid #0f3460;
      user-select: none;
      min-height: 52px;
    }
    .dbg-block { display: flex; flex-direction: column; }
    .dbg-label { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: .4px; }
    .dbg-value { font-size: 19px; font-weight: bold; line-height: 1.2; }

    #mode-indicator {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: bold;
      transition: background .1s, color .1s;
    }
    .mode-none      { background:#2a2a2a; color:#666; }
    .mode-penThin   { background:#0077b6; color:#fff; }
    .mode-penThick  { background:#f8961e; color:#000; }
    .mode-eraser    { background:#f72585; color:#fff; }

    #btn-settings {
      margin-left: auto;
      padding: 5px 10px;
      background: #0f3460;
      color: #eee;
      border: 1px solid #1a5276;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }
    #btn-settings.active { background: #4cc9f0; color: #000; }

    #btn-clear {
      padding: 5px 12px;
      background: #e63946;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-family: monospace;
    }

    /* ── Main area ─────────────────────────────────────────── */
    #main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    #canvas-wrap {
      flex: 1;
      position: relative;
    }

    canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      touch-action: none;
    }
    #draw-canvas  { z-index: 2; }
    #debug-canvas { z-index: 1; background: #111; }

    /* calibrating overlay */
    #canvas-wrap.calibrating::after {
      content: 'Toca con el instrumento…';
      position: absolute;
      inset: 0;
      z-index: 10;
      background: rgba(0,0,0,.45);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: #fff;
      pointer-events: none;
    }

    /* ── Sidebar ───────────────────────────────────────────── */
    #sidebar {
      width: 230px;
      background: #16213e;
      border-left: 2px solid #0f3460;
      padding: 14px 12px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
      transition: width .2s, padding .2s;
    }
    #sidebar.hidden {
      width: 0;
      padding: 0;
      overflow: hidden;
      border: none;
    }

    .sb-title {
      font-size: 13px;
      font-weight: bold;
      color: #aaa;
      border-bottom: 1px solid #0f3460;
      padding-bottom: 6px;
    }
    .sb-hint {
      font-size: 10px;
      color: #555;
      margin-top: -10px;
    }

    .tool-section {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 8px;
      border-radius: 8px;
      background: #0d1b2a;
    }
    .tool-name {
      font-size: 12px;
      font-weight: bold;
    }
    .c-thin   { color: #4cc9f0; }
    .c-thick  { color: #f8961e; }
    .c-eraser { color: #f72585; }

    .range-row {
      display: flex;
      gap: 6px;
    }
    .range-row label {
      display: flex;
      flex-direction: column;
      font-size: 10px;
      color: #777;
      flex: 1;
    }
    .range-row input {
      background: #1a2a3a;
      border: 1px solid #0f3460;
      color: #eee;
      font-family: monospace;
      font-size: 14px;
      padding: 3px 5px;
      border-radius: 4px;
      width: 100%;
    }

    .btn-read {
      padding: 5px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-family: monospace;
      font-size: 12px;
      background: #1a3a5a;
      color: #eee;
      transition: background .1s;
    }
    .btn-read.recording {
      background: #f72585;
      color: #fff;
      animation: pulse 1s infinite;
    }
    .btn-read:disabled {
      opacity: .35;
      cursor: default;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; }
      50%      { opacity: .6; }
    }

    .live-reading {
      font-size: 11px;
      color: #aaa;
      min-height: 36px;
      white-space: pre-line;
      line-height: 1.4;
    }

    #btn-reset {
      padding: 6px;
      background: #2a1a1a;
      color: #f72585;
      border: 1px solid #f7258555;
      border-radius: 6px;
      cursor: pointer;
      font-family: monospace;
      font-size: 11px;
      margin-top: auto;
    }
  </style>
</head>
<body>

<!-- ── Debug bar ──────────────────────────────────────────────────────── -->
<div id="debug">
  <div class="dbg-block">
    <span class="dbg-label">Puntos</span>
    <span class="dbg-value" id="d-count">0</span>
  </div>
  <div class="dbg-block">
    <span class="dbg-label">Área (kpx²)</span>
    <span class="dbg-value" id="d-area">0.00</span>
  </div>
  <div class="dbg-block">
    <span class="dbg-label">BBox W × H</span>
    <span class="dbg-value" id="d-bbox">— × —</span>
  </div>
  <div class="dbg-block">
    <span class="dbg-label">radiusX / Y</span>
    <span class="dbg-value" id="d-radius">— / —</span>
  </div>
  <div id="mode-indicator" class="mode-none">Ninguno</div>
  <button id="btn-clear">Limpiar</button>
  <button id="btn-settings">⚙</button>
</div>

<!-- ── Main ───────────────────────────────────────────────────────────── -->
<div id="main">
  <div id="canvas-wrap">
    <canvas id="debug-canvas"></canvas>
    <canvas id="draw-canvas"></canvas>
  </div>

  <!-- ── Sidebar de calibración ─────────────────────────────────────── -->
  <div id="sidebar" class="hidden">
    <div class="sb-title">Umbrales <small style="color:#555">(kpx² = px²/1000)</small></div>
    <div class="sb-hint">Tolerancia ±0.2 se aplica al guardar</div>

    <!-- Lápiz fino -->
    <div class="tool-section">
      <div class="tool-name c-thin">● Lápiz fino</div>
      <div class="range-row">
        <label>min<input type="number" id="min-penThin" step="0.1" min="0" value="0.3"></label>
        <label>max<input type="number" id="max-penThin" step="0.1" min="0" value="1.1"></label>
      </div>
      <button class="btn-read" data-tool="penThin">▶ Leer</button>
      <div class="live-reading" id="live-penThin">—</div>
    </div>

    <!-- Lápiz grueso -->
    <div class="tool-section">
      <div class="tool-name c-thick">● Lápiz grueso</div>
      <div class="range-row">
        <label>min<input type="number" id="min-penThick" step="0.1" min="0" value="1.3"></label>
        <label>max<input type="number" id="max-penThick" step="0.1" min="0" value="2.3"></label>
      </div>
      <button class="btn-read" data-tool="penThick">▶ Leer</button>
      <div class="live-reading" id="live-penThick">—</div>
    </div>

    <!-- Palma / Borrador -->
    <div class="tool-section">
      <div class="tool-name c-eraser">● Palma / Borrador</div>
      <div class="range-row">
        <label>min<input type="number" id="min-eraser" step="0.1" min="0" value="4.3"></label>
        <label>max<input type="number" id="max-eraser" step="0.1" min="0" value="6.7"></label>
      </div>
      <button class="btn-read" data-tool="eraser">▶ Leer</button>
      <div class="live-reading" id="live-eraser">—</div>
    </div>

    <button id="btn-reset">↺ Restaurar defaults</button>
  </div>
</div>

<script>
// ─── Canvases ──────────────────────────────────────────────────────────────
const wrap  = document.getElementById('canvas-wrap');
const dc    = document.getElementById('draw-canvas');
const dctx  = dc.getContext('2d');
const bc    = document.getElementById('debug-canvas');
const bctx  = bc.getContext('2d');

function resize() {
  const dpr = window.devicePixelRatio || 1;
  const w = wrap.clientWidth, h = wrap.clientHeight;
  [dc, bc].forEach(c => {
    c.width  = w * dpr;
    c.height = h * dpr;
    c.style.width  = w + 'px';
    c.style.height = h + 'px';
    c.getContext('2d').scale(dpr, dpr);
  });
}
resize();
window.addEventListener('resize', resize);

// ─── Umbrales ──────────────────────────────────────────────────────────────
const UNIT      = 1000;   // px² ÷ UNIT = kpx² mostrado al usuario
const TOLERANCE = 0.2;

const DEFAULTS = {
  penThin:  { min: 0.3, max: 1.1 },   // raw 0.5–0.9  ±0.2
  penThick: { min: 1.3, max: 2.3 },   // raw 1.5–2.1  ±0.2
  eraser:   { min: 4.3, max: 6.7 },   // raw 4.5–6.5  ±0.2
};

function loadThresholds() {
  try { return JSON.parse(localStorage.getItem('pen-thresholds')); } catch { return null; }
}
function saveThresholds() {
  localStorage.setItem('pen-thresholds', JSON.stringify(thresholds));
}

let thresholds = loadThresholds() || JSON.parse(JSON.stringify(DEFAULTS));

// Sync inputs → thresholds on any input change
['penThin', 'penThick', 'eraser'].forEach(tool => {
  ['min', 'max'].forEach(bound => {
    document.getElementById(bound + '-' + tool).addEventListener('change', () => {
      thresholds[tool][bound] = parseFloat(document.getElementById(bound + '-' + tool).value) || 0;
      saveThresholds();
    });
  });
});

function applyThresholdsToInputs() {
  ['penThin', 'penThick', 'eraser'].forEach(tool => {
    document.getElementById('min-' + tool).value = thresholds[tool].min;
    document.getElementById('max-' + tool).value = thresholds[tool].max;
  });
}
applyThresholdsToInputs();

const MODES = {
  none:     { label: 'Ninguno',      cls: 'mode-none',     size: 0,  color: null,      erase: false },
  penThin:  { label: 'Lápiz fino',   cls: 'mode-penThin',  size: 2,  color: '#4cc9f0', erase: false },
  penThick: { label: 'Lápiz grueso', cls: 'mode-penThick', size: 14, color: '#f8961e', erase: false },
  eraser:   { label: 'Borrador',     cls: 'mode-eraser',   size: 60, color: null,      erase: true  },
};

function detectMode(areaPx) {
  const a = areaPx / UNIT;
  if (a >= thresholds.penThin.min  && a <= thresholds.penThin.max)  return 'penThin';
  if (a >= thresholds.penThick.min && a <= thresholds.penThick.max) return 'penThick';
  if (a >= thresholds.eraser.min   && a <= thresholds.eraser.max)   return 'eraser';
  return 'none';
}

// ─── BBox y radius ─────────────────────────────────────────────────────────
function getBBox(touches) {
  if (!touches.length) return null;
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  const rect = dc.getBoundingClientRect();
  Array.from(touches).forEach(t => {
    const x = t.clientX - rect.left, y = t.clientY - rect.top;
    minX = Math.min(minX, x); maxX = Math.max(maxX, x);
    minY = Math.min(minY, y); maxY = Math.max(maxY, y);
  });
  const w = maxX - minX, h = maxY - minY;
  return { minX, minY, w, h, area: Math.max(w * h, 1) };
}

function getAvgRadius(touches) {
  let rx = 0, ry = 0;
  Array.from(touches).forEach(t => { rx += (t.radiusX || 0); ry += (t.radiusY || 0); });
  const n = touches.length;
  return { rx: rx / n, ry: ry / n };
}

// ─── Dibujo ────────────────────────────────────────────────────────────────
const paths = {};

function canvasPos(t) {
  const rect = dc.getBoundingClientRect();
  return { x: t.clientX - rect.left, y: t.clientY - rect.top };
}

function drawStep(from, to, mode) {
  const m = MODES[mode];
  if (!m.size) return;
  dctx.beginPath();
  dctx.moveTo(from.x, from.y);
  dctx.lineTo(to.x, to.y);
  dctx.lineWidth  = m.size;
  dctx.lineCap    = 'round';
  dctx.lineJoin   = 'round';
  if (m.erase) {
    dctx.globalCompositeOperation = 'destination-out';
    dctx.strokeStyle = 'rgba(0,0,0,1)';
  } else {
    dctx.globalCompositeOperation = 'source-over';
    dctx.strokeStyle = m.color;
  }
  dctx.stroke();
  dctx.globalCompositeOperation = 'source-over';
}

// ─── Debug overlay ─────────────────────────────────────────────────────────
function drawDebugOverlay(touches, bbox, mode) {
  const w = bc.width / (window.devicePixelRatio || 1);
  const h = bc.height / (window.devicePixelRatio || 1);
  bctx.clearRect(0, 0, w, h);
  if (!touches.length) return;
  const m = MODES[mode];
  const dotColor = m.erase ? '#f72585' : (m.color || '#fff');
  const rect = dc.getBoundingClientRect();

  Array.from(touches).forEach(t => {
    const x = t.clientX - rect.left, y = t.clientY - rect.top;
    bctx.beginPath();
    bctx.arc(x, y, 5, 0, Math.PI * 2);
    bctx.fillStyle = dotColor;
    bctx.fill();
    if ((t.radiusX || 0) > 1) {
      bctx.beginPath();
      bctx.ellipse(x, y, t.radiusX, t.radiusY || t.radiusX, 0, 0, Math.PI * 2);
      bctx.strokeStyle = 'rgba(255,255,255,.25)';
      bctx.lineWidth = 1;
      bctx.stroke();
    }
  });

  if (bbox && (bbox.w > 5 || bbox.h > 5)) {
    bctx.strokeStyle = m.erase ? '#f7258588' : '#ffffff44';
    bctx.lineWidth = 1;
    bctx.setLineDash([4, 4]);
    bctx.strokeRect(bbox.minX, bbox.minY, bbox.w, bbox.h);
    bctx.setLineDash([]);
    bctx.fillStyle = '#fff';
    bctx.font = '11px monospace';
    bctx.fillText(
      `${Math.round(bbox.w)}×${Math.round(bbox.h)} = ${(bbox.area / UNIT).toFixed(2)} kpx²`,
      bbox.minX + 3, bbox.minY - 4
    );
  }
}

// ─── Update debug bar ──────────────────────────────────────────────────────
function updateDebug(touches) {
  const bbox   = getBBox(touches);
  const areaPx = bbox ? bbox.area : 0;
  const mode   = detectMode(areaPx);
  const m      = MODES[mode];
  const { rx, ry } = getAvgRadius(touches);

  document.getElementById('d-count').textContent = touches.length;
  document.getElementById('d-area').textContent  = (areaPx / UNIT).toFixed(2);
  document.getElementById('d-bbox').textContent  = bbox
    ? `${Math.round(bbox.w)} × ${Math.round(bbox.h)}`
    : '— × —';
  document.getElementById('d-radius').textContent = touches.length
    ? `${rx.toFixed(1)} / ${ry.toFixed(1)}`
    : '— / —';

  const mi = document.getElementById('mode-indicator');
  mi.textContent = m.label;
  mi.className   = m.cls;

  drawDebugOverlay(touches, bbox, mode);
  return { mode, areaPx };
}

// ─── Calibración ───────────────────────────────────────────────────────────
let calState = null;   // null | 'penThin' | 'penThick' | 'eraser'
let calMin = Infinity, calMax = -Infinity, calCount = 0;

function updateCalLive(tool, areaPx) {
  const a = areaPx / UNIT;
  calMin = Math.min(calMin, a);
  calMax = Math.max(calMax, a);
  calCount++;
  document.getElementById('live-' + tool).textContent =
    `actual: ${a.toFixed(2)}\nmin: ${calMin.toFixed(2)}  max: ${calMax.toFixed(2)}\n(${calCount} lecturas)`;
}

document.querySelectorAll('.btn-read').forEach(btn => {
  btn.addEventListener('click', () => {
    const tool = btn.dataset.tool;

    if (calState === tool) {
      // ── Guardar ──────────────────────────────────────────
      if (calCount > 0) {
        thresholds[tool] = {
          min: Math.max(0, parseFloat((calMin - TOLERANCE).toFixed(2))),
          max:            parseFloat((calMax + TOLERANCE).toFixed(2)),
        };
        saveThresholds();
        applyThresholdsToInputs();
      }
      stopCal(tool, btn);
    } else {
      // ── Iniciar lectura ───────────────────────────────────
      if (calState) return; // ya hay una activa
      calState = tool;
      calMin = Infinity; calMax = -Infinity; calCount = 0;
      btn.textContent = '■ Guardar';
      btn.classList.add('recording');
      document.getElementById('live-' + tool).textContent = 'Toca la pantalla…';
      wrap.classList.add('calibrating');
      document.querySelectorAll('.btn-read').forEach(b => {
        if (b !== btn) b.disabled = true;
      });
    }
  });
});

function stopCal(tool, btn) {
  calState = null;
  calMin = Infinity; calMax = -Infinity; calCount = 0;
  btn.textContent = '▶ Leer';
  btn.classList.remove('recording');
  document.getElementById('live-' + tool).textContent = '—';
  wrap.classList.remove('calibrating');
  document.querySelectorAll('.btn-read').forEach(b => { b.disabled = false; });
}

// ─── Touch events ──────────────────────────────────────────────────────────
dc.addEventListener('touchstart', e => {
  e.preventDefault();
  const { mode, areaPx } = updateDebug(e.touches);

  if (calState) {
    if (e.touches.length) updateCalLive(calState, areaPx);
    return;
  }

  Array.from(e.changedTouches).forEach(t => {
    paths[t.identifier] = { pos: canvasPos(t), mode };
  });
}, { passive: false });

dc.addEventListener('touchmove', e => {
  e.preventDefault();
  const { mode, areaPx } = updateDebug(e.touches);

  if (calState) {
    if (e.touches.length) updateCalLive(calState, areaPx);
    return;
  }

  Array.from(e.changedTouches).forEach(t => {
    const newPos = canvasPos(t);
    const entry  = paths[t.identifier];
    if (entry) {
      entry.mode = mode;
      drawStep(entry.pos, newPos, mode);
      entry.pos = newPos;
    } else {
      paths[t.identifier] = { pos: newPos, mode };
    }
  });
}, { passive: false });

dc.addEventListener('touchend', e => {
  e.preventDefault();
  Array.from(e.changedTouches).forEach(t => delete paths[t.identifier]);
  updateDebug(e.touches);
}, { passive: false });

dc.addEventListener('touchcancel', e => {
  Array.from(e.changedTouches).forEach(t => delete paths[t.identifier]);
  updateDebug(e.touches);
}, { passive: false });

// ─── Mouse fallback ─────────────────────────────────────────────────────────
let mouseDown = false, lastMouse = null;
dc.addEventListener('mousedown', e => {
  if (calState) return;
  mouseDown = true;
  const rect = dc.getBoundingClientRect();
  lastMouse  = { x: e.clientX - rect.left, y: e.clientY - rect.top };
});
dc.addEventListener('mousemove', e => {
  if (!mouseDown || calState) return;
  const rect = dc.getBoundingClientRect();
  const pos  = { x: e.clientX - rect.left, y: e.clientY - rect.top };
  drawStep(lastMouse, pos, 'penThin');
  lastMouse = pos;
});
dc.addEventListener('mouseup', () => { mouseDown = false; lastMouse = null; });

// ─── Sidebar toggle ─────────────────────────────────────────────────────────
const sidebar = document.getElementById('sidebar');
const btnSet  = document.getElementById('btn-settings');
btnSet.addEventListener('click', () => {
  sidebar.classList.toggle('hidden');
  btnSet.classList.toggle('active');
  setTimeout(resize, 250);
});

// ─── Limpiar / Reset ────────────────────────────────────────────────────────
document.getElementById('btn-clear').addEventListener('click', () => {
  const w = dc.width  / (window.devicePixelRatio || 1);
  const h = dc.height / (window.devicePixelRatio || 1);
  dctx.clearRect(0, 0, w, h);
});

document.getElementById('btn-reset').addEventListener('click', () => {
  thresholds = JSON.parse(JSON.stringify(DEFAULTS));
  saveThresholds();
  applyThresholdsToInputs();
});
</script>
</body>
</html>
