<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>pen-detector</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#111; color:#eee; font-family:monospace; height:100vh; display:flex; flex-direction:column; overflow:hidden; }

    #bar {
      background:#1a1a2e; padding:8px 12px;
      display:flex; align-items:center; gap:10px; flex-wrap:wrap;
      border-bottom:2px solid #0f3460; min-height:48px; user-select:none;
    }

    #tool { padding:3px 12px; border-radius:20px; font-size:13px; font-weight:bold; background:#222; color:#555; }
    .t-penThin  { background:#0077b6 !important; color:#fff !important; }
    .t-penThick { background:#f8961e !important; color:#000 !important; }
    .t-eraser   { background:#f72585 !important; color:#fff !important; }

    #dbg { font-size:10px; color:#666; line-height:1.6; }

    button.plain {
      padding:4px 10px; background:#222; color:#aaa;
      border:1px solid #333; border-radius:6px; cursor:pointer; font-family:monospace; font-size:12px;
    }
    button.plain:hover { background:#333; }
    #btn-cfg { margin-left:auto; }
    #btn-cfg.on { background:#4cc9f0; color:#000; border-color:#4cc9f0; }

    #wrap { flex:1; position:relative; }
    canvas { position:absolute; inset:0; width:100%; height:100%; touch-action:none; }
    #cc { background:#1a1a2e; }
    #dc { z-index:1; }

    /* calibration panel */
    #cal {
      position:absolute; top:0; right:0; bottom:0; width:230px;
      background:#16213e; border-left:2px solid #0f3460;
      padding:12px; display:flex; flex-direction:column; gap:10px;
      overflow-y:auto; z-index:5;
      transform:translateX(100%); transition:transform .2s;
    }
    #cal.open { transform:translateX(0); }
    .cal-title { font-size:12px; color:#aaa; border-bottom:1px solid #0f3460; padding-bottom:6px; }
    .tool-row { background:#0d1b2a; border-radius:6px; padding:8px; display:flex; flex-direction:column; gap:5px; border:2px solid transparent; }
    .tool-row.active { border-color:#f72585; }
    .tool-label { font-size:11px; font-weight:bold; }
    .inputs { display:flex; gap:6px; }
    .inputs label { flex:1; min-width:0; display:flex; flex-direction:column; font-size:9px; color:#666; }
    .inputs input { width:100%; min-width:0; background:#0a1525; border:1px solid #1a3a5a; color:#eee; font-family:monospace; font-size:12px; padding:3px 4px; border-radius:4px; }
    .cal-btns { display:flex; gap:5px; }
    .btn-read { flex:1; padding:4px 6px; border:none; border-radius:5px; background:#1a3a5a; color:#eee; cursor:pointer; font-family:monospace; font-size:11px; }
    .btn-read.rec  { background:#f72585; color:#fff; }
    .btn-read.save { background:#2d6a4f; color:#fff; }
    .btn-read:disabled { opacity:.3; cursor:default; }
    .btn-cancel { padding:4px 8px; border:none; border-radius:5px; background:#3a1020; color:#f72585; cursor:pointer; font-family:monospace; font-size:11px; }
    .live { font-size:10px; color:#4cc9f0; white-space:pre-line; min-height:28px; }
    #btn-reset { margin-top:auto; padding:5px; background:#2a1010; color:#f72585; border:1px solid #f7258533; border-radius:5px; cursor:pointer; font-size:11px; font-family:monospace; }
  </style>
</head>
<body>

<div id="bar">
  <div id="tool">Ninguno</div>
  <div id="dbg">
    <span id="d1">pts:—</span> &nbsp;
    <span id="d2">metric:—</span> &nbsp;
    <span id="d3">rX:—</span> &nbsp;
    <span id="d4">rY:—</span> &nbsp;
    <span id="d5">√(rX²+rY²):—</span><br>
    <span id="d6">bbox:—</span> &nbsp;
    <span id="d7">bboxArea:—</span> &nbsp;
    <span id="d8" style="color:#4cc9f0">grosor:—</span>
  </div>
  <button class="plain" id="btn-clr">Limpiar</button>
  <label style="font-size:11px;color:#aaa;display:flex;align-items:center;gap:4px;white-space:nowrap">
    ×rad <input type="number" id="rad-mult" value="8" min="1" max="200" step="1"
      style="width:50px;background:#0a1525;border:1px solid #1a3a5a;color:#4cc9f0;font-family:monospace;font-size:13px;padding:2px 5px;border-radius:4px">
  </label>
  <label style="font-size:11px;color:#aaa;display:flex;align-items:center;gap:4px;white-space:nowrap">
    sm-xy <input type="range" id="sm-xy" min="0" max="0.95" step="0.05" value="0.2" style="width:60px;accent-color:#4cc9f0">
    <span id="sm-xy-val" style="color:#4cc9f0;min-width:28px">0.20</span>
  </label>
  <label style="font-size:11px;color:#aaa;display:flex;align-items:center;gap:4px;white-space:nowrap">
    sm-P <input type="range" id="sm-p" min="0" max="0.95" step="0.05" value="0.6" style="width:60px;accent-color:#f8961e">
    <span id="sm-p-val" style="color:#f8961e;min-width:28px">0.60</span>
  </label>
  <button class="plain" id="btn-cfg">⚙ Calibrar</button>
  <span style="font-size:10px;color:#444">v2.0</span>
</div>

<div id="wrap">
  <canvas id="cc"></canvas>
  <canvas id="dc"></canvas>

  <div id="cal">
    <div class="cal-title">Umbrales IR (radio px)</div>

    <div class="tool-row" id="row-penThin">
      <div class="tool-label" style="color:#4cc9f0">● Lápiz fino</div>
      <div class="inputs">
        <label>min<input type="number" id="min-penThin" step="0.01" value="0"></label>
        <label>max<input type="number" id="max-penThin" step="0.01" value="1.2"></label>
      </div>
      <div class="cal-btns">
        <button class="btn-read" data-tool="penThin">▶ Leer</button>
        <button class="btn-cancel" data-tool="penThin" style="display:none">✕</button>
      </div>
      <div class="live" id="live-penThin"></div>
    </div>

    <div class="tool-row" id="row-penThick">
      <div class="tool-label" style="color:#f8961e">● Lápiz grueso</div>
      <div class="inputs">
        <label>min<input type="number" id="min-penThick" step="0.01" value="1.2"></label>
        <label>max<input type="number" id="max-penThick" step="0.01" value="2.5"></label>
      </div>
      <div class="cal-btns">
        <button class="btn-read" data-tool="penThick">▶ Leer</button>
        <button class="btn-cancel" data-tool="penThick" style="display:none">✕</button>
      </div>
      <div class="live" id="live-penThick"></div>
    </div>

    <div class="tool-row" id="row-eraser">
      <div class="tool-label" style="color:#f72585">● Palma</div>
      <div class="inputs">
        <label>min<input type="number" id="min-eraser" step="0.01" value="10"></label>
        <label>max<input type="number" id="max-eraser" step="0.01" value="30"></label>
      </div>
      <div class="cal-btns">
        <button class="btn-read" data-tool="eraser">▶ Leer</button>
        <button class="btn-cancel" data-tool="eraser" style="display:none">✕</button>
      </div>
      <div class="live" id="live-eraser"></div>
    </div>

    <div style="font-size:9px;color:#444;line-height:1.5">dedo ~2.5–10 = ninguno</div>
    <button id="btn-reset">↺ Defaults</button>
  </div>
</div>

<script type="module">
import { PenDetector } from './pen-detector.js';

// ── canvas ────────────────────────────────────────────────────────────────
const wrap = document.getElementById('wrap');
const cc = document.getElementById('cc'), cctx = cc.getContext('2d');
const dc = document.getElementById('dc'), dctx = dc.getContext('2d');

function resize() {
  const dpr = devicePixelRatio || 1, w = wrap.clientWidth, h = wrap.clientHeight;
  [cc, dc].forEach(c => {
    c.width = w * dpr; c.height = h * dpr;
    c.style.width = w + 'px'; c.style.height = h + 'px';
    c.getContext('2d').scale(dpr, dpr);
  });
}
resize();
window.addEventListener('resize', resize);

// ── detector ──────────────────────────────────────────────────────────────
let radMult = 8;
document.getElementById('rad-mult').addEventListener('input', e => { radMult = Math.max(1, +e.target.value || 1); });
document.getElementById('sm-xy').addEventListener('input', e => {
  document.getElementById('sm-xy-val').textContent = (+e.target.value).toFixed(2);
  det.setSmooth({ xy: +e.target.value });
});
document.getElementById('sm-p').addEventListener('input', e => {
  document.getElementById('sm-p-val').textContent = (+e.target.value).toFixed(2);
  det.setSmooth({ pressure: +e.target.value });
});

const saved = loadThresholds();
const det = new PenDetector({
  element: dc,
  thresholds: saved || undefined,
  smooth: { xy: 0.2, pressure: 0.6 },
});
if (saved) syncInputs();

// ── stroke rendering (Catmull-Rom, double buffer) ─────────────────────────
let strokePts = [], strokeTool = null, erasePrev = null;

det.on('pendown', e => {
  setDebug(e);
  if (e.tool === 'eraser') { erasePrev = { x: e.x, y: e.y }; return; }
  if (e.tool === 'none')   return;
  strokePts = [{ x: e.x, y: e.y, r: e.radiusMag || 0 }];
  strokeTool = e.tool;
});

det.on('penmove', e => {
  setDebug(e);
  if (e.tool === 'eraser') {
    if (erasePrev) eraseSegment(erasePrev, e);
    erasePrev = { x: e.x, y: e.y }; return;
  }
  if (!strokeTool) return;
  strokePts.push({ x: e.x, y: e.y, r: e.radiusMag || 0 });
  redrawActive();
});

det.on('penup', () => {
  if (strokePts.length > 1 && strokeTool) commitStroke();
  strokePts = []; strokeTool = null; erasePrev = null;
  clearDebug();
});

const COLORS = { penThin: '#4cc9f0', penThick: '#f8961e' };

function lineWidth(pts) {
  const s = pts.slice(0, 8);
  return Math.max(1, (s.reduce((a,p) => a + p.r, 0) / s.length) * radMult || 2);
}

function catmullRom(ctx, pts, color, lw) {
  if (pts.length < 2) return;
  ctx.save();
  ctx.beginPath(); ctx.lineWidth = lw; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.strokeStyle = color;
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 0; i < pts.length - 1; i++) {
    const p0 = pts[Math.max(0,i-1)], p1 = pts[i];
    const p2 = pts[i+1],            p3 = pts[Math.min(pts.length-1,i+2)];
    ctx.bezierCurveTo(
      p1.x+(p2.x-p0.x)/6, p1.y+(p2.y-p0.y)/6,
      p2.x-(p3.x-p1.x)/6, p2.y-(p3.y-p1.y)/6,
      p2.x, p2.y
    );
  }
  ctx.stroke(); ctx.restore();
}

function redrawActive() {
  const dpr = devicePixelRatio||1, color = COLORS[strokeTool]; if (!color) return;
  dctx.clearRect(0, 0, dc.width/dpr, dc.height/dpr);
  catmullRom(dctx, strokePts, color, lineWidth(strokePts));
}

function commitStroke() {
  const color = COLORS[strokeTool]; if (!color) return;
  catmullRom(cctx, strokePts, color, lineWidth(strokePts));
  const dpr = devicePixelRatio||1;
  dctx.clearRect(0, 0, dc.width/dpr, dc.height/dpr);
}

function eraseSegment(from, to) {
  [cctx, dctx].forEach(ctx => {
    ctx.save(); ctx.globalCompositeOperation = 'destination-out';
    ctx.beginPath(); ctx.moveTo(from.x, from.y); ctx.lineTo(to.x, to.y);
    ctx.lineWidth = 50; ctx.lineCap = 'round'; ctx.strokeStyle = 'rgba(0,0,0,1)';
    ctx.stroke(); ctx.restore();
  });
}

// ── debug ─────────────────────────────────────────────────────────────────
function setDebug(e) {
  const tb = document.getElementById('tool');
  tb.textContent = e.tool; tb.className = 't-' + e.tool;
  document.getElementById('d1').textContent = `pts:${e.pointCount}`;
  document.getElementById('d2').textContent = `metric:${(e.metric??0).toFixed(2)}`;
  document.getElementById('d3').textContent = `rX:${(e.radiusX??0).toFixed(2)}`;
  document.getElementById('d4').textContent = `rY:${(e.radiusY??0).toFixed(2)}`;
  document.getElementById('d5').textContent = `√(rX²+rY²):${(e.radiusMag??0).toFixed(2)}`;
  document.getElementById('d6').textContent = `bbox:${Math.round(e.bboxW??0)}×${Math.round(e.bboxH??0)}`;
  document.getElementById('d7').textContent = `bboxArea:${Math.round(e.bboxArea??0)}px²`;
  document.getElementById('d8').textContent = `grosor:${((e.radiusMag||0)*radMult).toFixed(1)}px`;
}
function clearDebug() {
  document.getElementById('tool').textContent = 'Ninguno';
  document.getElementById('tool').className = '';
  ['d1','d2','d3','d4','d5','d6','d7','d8'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.textContent = el.textContent.split(':')[0] + ':—';
  });
}

// ── clear button ──────────────────────────────────────────────────────────
document.getElementById('btn-clr').addEventListener('click', () => {
  const dpr = devicePixelRatio||1, w = dc.width/dpr, h = dc.height/dpr;
  dctx.clearRect(0,0,w,h); cctx.clearRect(0,0,w,h);
});

// ── calibration panel ─────────────────────────────────────────────────────
document.getElementById('btn-cfg').addEventListener('click', () => {
  document.getElementById('cal').classList.toggle('open');
  document.getElementById('btn-cfg').classList.toggle('on');
});

let calTool = null, calMin = Infinity, calMax = -Infinity, calCount = 0;
let calPhase = 'idle', calOldThr = null;
const TOL = 0.15;

function setPhase(tool, phase) {
  calPhase = phase; calTool = phase === 'idle' ? null : tool;
  const btn    = document.querySelector(`.btn-read[data-tool="${tool}"]`);
  const canBtn = document.querySelector(`.btn-cancel[data-tool="${tool}"]`);
  const row    = document.getElementById('row-' + tool);
  btn.classList.remove('rec', 'save');
  if (phase === 'idle') {
    btn.textContent = '▶ Leer'; canBtn.style.display = 'none';
    row.classList.remove('active');
    document.querySelectorAll('.btn-read').forEach(b => b.disabled = false);
  } else if (phase === 'reading') {
    btn.textContent = '■ Parar'; btn.classList.add('rec'); canBtn.style.display = '';
    row.classList.add('active');
    document.querySelectorAll('.btn-read').forEach(b => { if (b !== btn) b.disabled = true; });
  } else if (phase === 'stopped') {
    btn.textContent = '✓ Guardar'; btn.classList.add('save'); canBtn.style.display = '';
  }
}

document.querySelectorAll('.btn-read').forEach(btn => {
  btn.addEventListener('click', () => {
    const tool = btn.dataset.tool;
    if (calPhase === 'idle') {
      calOldThr = JSON.parse(JSON.stringify(det.thresholds));
      calMin = Infinity; calMax = -Infinity; calCount = 0;
      document.getElementById('live-' + tool).textContent = 'Toca con el instrumento…';
      det.off('penmove', recordCal); det.on('penmove', recordCal);
      det.off('pendown', recordCal); det.on('pendown', recordCal);
      setPhase(tool, 'reading');
    } else if (calPhase === 'reading' && calTool === tool) {
      det.off('penmove', recordCal); det.off('pendown', recordCal);
      document.getElementById('live-' + tool).textContent =
        calCount > 0 ? `Capturado: ${calMin.toFixed(2)} – ${calMax.toFixed(2)}\nEdita si necesitas.`
                     : 'Sin lecturas — edita manualmente';
      setPhase(tool, 'stopped');
    } else if (calPhase === 'stopped' && calTool === tool) {
      const minV = parseFloat(document.getElementById('min-'+tool).value);
      const maxV = parseFloat(document.getElementById('max-'+tool).value);
      if (!isNaN(minV) && !isNaN(maxV) && maxV > minV) {
        const t = {}; t[tool] = { min: minV, max: maxV };
        det.setThresholds(t); saveThresholds();
        document.getElementById('live-'+tool).textContent = `✓ ${minV} – ${maxV}`;
      }
      setPhase(tool, 'idle');
    }
  });
});

document.querySelectorAll('.btn-cancel').forEach(btn => {
  btn.addEventListener('click', () => {
    const tool = btn.dataset.tool;
    det.off('penmove', recordCal); det.off('pendown', recordCal);
    if (calOldThr) { det.setThresholds(calOldThr); syncInputs(); }
    document.getElementById('live-'+tool).textContent = 'Cancelado';
    setPhase(tool, 'idle');
  });
});

function recordCal(e) {
  if (!calTool || calPhase !== 'reading') return;
  if (e.metric < calMin) calMin = e.metric;
  if (e.metric > calMax) calMax = e.metric;
  calCount++;
  const minV = Math.max(0, calMin - TOL).toFixed(2);
  const maxV = (calMax + TOL).toFixed(2);
  document.getElementById('live-'+calTool).textContent =
    `actual: ${e.metric.toFixed(3)}\nrango:  ${minV} – ${maxV}\n(${calCount} lecturas)`;
  document.getElementById('min-'+calTool).value = minV;
  document.getElementById('max-'+calTool).value = maxV;
}

for (const tool of ['penThin','penThick','eraser']) {
  for (const b of ['min','max']) {
    document.getElementById(b+'-'+tool).addEventListener('input', () => {
      if (calPhase === 'reading') return;
      const v = parseFloat(document.getElementById(b+'-'+tool).value);
      if (!isNaN(v)) { const u={}; u[tool]={...det.thresholds[tool],[b]:v}; det.setThresholds(u); saveThresholds(); }
    });
  }
}

document.getElementById('btn-reset').addEventListener('click', () => {
  det.setThresholds({ penThin:{min:0,max:1.2}, penThick:{min:1.2,max:2.5}, eraser:{min:10,max:30} });
  saveThresholds(); syncInputs();
});

// ── persistence ───────────────────────────────────────────────────────────
function saveThresholds() {
  try { localStorage.setItem('pd-thr', JSON.stringify(det.thresholds)); } catch {}
}
function loadThresholds() {
  try { const d = JSON.parse(localStorage.getItem('pd-thr')); if (d?.penThin) return d; } catch {}
  return null;
}
function syncInputs() {
  const t = det.thresholds;
  for (const tool of ['penThin','penThick','eraser']) {
    document.getElementById('min-'+tool).value = t[tool].min;
    document.getElementById('max-'+tool).value = t[tool].max;
  }
}
</script>
</body>
</html>
