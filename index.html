<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Touch Area Detection</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      color: #eee;
      font-family: monospace;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #debug {
      background: #16213e;
      padding: 8px 14px;
      display: flex;
      gap: 18px;
      align-items: center;
      flex-wrap: wrap;
      border-bottom: 2px solid #0f3460;
      z-index: 10;
      user-select: none;
      min-height: 54px;
    }

    .dbg-block { display: flex; flex-direction: column; }
    .dbg-label { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: .5px; }
    .dbg-value { font-size: 20px; font-weight: bold; line-height: 1.2; }

    #mode-indicator {
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: bold;
      transition: background .1s, color .1s;
    }
    .mode-none      { background:#333;    color:#777; }
    .mode-pen-thin  { background:#0077b6; color:#fff; }
    .mode-pen-thick { background:#f8961e; color:#000; }
    .mode-eraser    { background:#f72585; color:#fff; }

    #bbox-info { font-size: 12px; color: #aaa; }

    #btn-clear {
      margin-left: auto;
      padding: 5px 12px;
      background: #e63946;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-family: monospace;
    }

    #canvas-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      touch-action: none;
    }

    /* capa de dibujo encima del canvas de debug */
    #draw-canvas { z-index: 2; }
    #debug-canvas { z-index: 1; background: #111; }
  </style>
</head>
<body>

<div id="debug">
  <div class="dbg-block">
    <span class="dbg-label">Puntos</span>
    <span class="dbg-value" id="d-count">0</span>
  </div>
  <div class="dbg-block">
    <span class="dbg-label">Área bbox (px²)</span>
    <span class="dbg-value" id="d-area">0</span>
  </div>
  <div class="dbg-block">
    <span class="dbg-label">BBox W × H</span>
    <span class="dbg-value" id="d-bbox">— × —</span>
  </div>
  <div class="dbg-block">
    <span class="dbg-label">radiusX / Y</span>
    <span class="dbg-value" id="d-radius">— / —</span>
  </div>
  <div id="mode-indicator" class="mode-none">Ninguno</div>
  <div id="bbox-info"></div>
  <button id="btn-clear">Limpiar</button>
</div>

<div id="canvas-wrap">
  <!-- canvas de fondo: dibuja el bounding box en debug -->
  <canvas id="debug-canvas"></canvas>
  <!-- canvas de dibujo real -->
  <canvas id="draw-canvas"></canvas>
</div>

<script>
// ─── Canvases ───────────────────────────────────────────────────────────────
const wrap   = document.getElementById('canvas-wrap');
const dc     = document.getElementById('draw-canvas');
const dctx   = dc.getContext('2d');
const bc     = document.getElementById('debug-canvas');
const bctx   = bc.getContext('2d');

function resize() {
  const dpr = window.devicePixelRatio || 1;
  const w = wrap.clientWidth, h = wrap.clientHeight;
  [dc, bc].forEach(c => {
    c.width  = w * dpr;
    c.height = h * dpr;
    c.style.width  = w + 'px';
    c.style.height = h + 'px';
    c.getContext('2d').scale(dpr, dpr);
  });
}
resize();
window.addEventListener('resize', resize);

// ─── Umbrales de área (px²) ─────────────────────────────────────────────────
// Ajusta según tu pantalla IR. Estos son puntos de partida.
const AREA_THRESHOLDS = {
  penThin:  500,    // área < 500 px²  → lápiz fino
  penThick: 8000,   // área < 8000 px² → lápiz grueso / dedo
  // área >= 8000   → borrador / palma
};

const MODES = {
  none:     { label: 'Ninguno',      cls: 'mode-none',      size: 0,  color: null,      erase: false },
  penThin:  { label: 'Lápiz fino',   cls: 'mode-pen-thin',  size: 2,  color: '#4cc9f0', erase: false },
  penThick: { label: 'Lápiz grueso', cls: 'mode-pen-thick', size: 14, color: '#f8961e', erase: false },
  eraser:   { label: 'Borrador',     cls: 'mode-eraser',    size: 60, color: null,      erase: true  },
};

function detectMode(area) {
  if (area === 0)                         return 'none';
  if (area < AREA_THRESHOLDS.penThin)     return 'penThin';
  if (area < AREA_THRESHOLDS.penThick)    return 'penThick';
  return 'eraser';
}

// ─── Calcular bounding box de todos los touches activos ─────────────────────
function getBBox(touches) {
  if (!touches.length) return null;
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  Array.from(touches).forEach(t => {
    const rect = dc.getBoundingClientRect();
    const x = t.clientX - rect.left;
    const y = t.clientY - rect.top;
    minX = Math.min(minX, x); maxX = Math.max(maxX, x);
    minY = Math.min(minY, y); maxY = Math.max(maxY, y);
  });
  const w = maxX - minX;
  const h = maxY - minY;
  // Para punto único usamos un área mínima representativa del contacto físico
  // Si el hardware reporta radius, lo usamos; si no, asumimos 10px de radio
  return { minX, minY, maxX, maxY, w, h, area: Math.max(w * h, 1) };
}

// Promedio de radiusX/Y de todos los touches (si el hardware lo reporta)
function getAvgRadius(touches) {
  let rx = 0, ry = 0;
  Array.from(touches).forEach(t => { rx += (t.radiusX || 0); ry += (t.radiusY || 0); });
  const n = touches.length;
  return { rx: rx / n, ry: ry / n };
}

// ─── Dibujo ─────────────────────────────────────────────────────────────────
const paths = {}; // { [identifier]: { x, y } }

function canvasPos(touch) {
  const rect = dc.getBoundingClientRect();
  return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
}

function drawStep(from, to, mode) {
  const m = MODES[mode];
  dctx.beginPath();
  dctx.moveTo(from.x, from.y);
  dctx.lineTo(to.x, to.y);
  dctx.lineWidth   = m.size;
  dctx.lineCap     = 'round';
  dctx.lineJoin    = 'round';
  if (m.erase) {
    dctx.globalCompositeOperation = 'destination-out';
    dctx.strokeStyle = 'rgba(0,0,0,1)';
  } else {
    dctx.globalCompositeOperation = 'source-over';
    dctx.strokeStyle = m.color;
  }
  dctx.stroke();
  dctx.globalCompositeOperation = 'source-over';
}

// ─── Debug overlay: dibuja bounding box en canvas de debug ─────────────────
function drawDebugOverlay(touches, bbox, mode) {
  const w = bc.width / (window.devicePixelRatio || 1);
  const h = bc.height / (window.devicePixelRatio || 1);
  bctx.clearRect(0, 0, w, h);

  if (!touches.length) return;

  const m = MODES[mode];

  // Puntos individuales
  Array.from(touches).forEach(t => {
    const rect = dc.getBoundingClientRect();
    const x = t.clientX - rect.left;
    const y = t.clientY - rect.top;

    bctx.beginPath();
    bctx.arc(x, y, 6, 0, Math.PI * 2);
    bctx.fillStyle = m.erase ? '#f72585' : (m.color || '#fff');
    bctx.fill();

    // Si hay radiusX/Y real del hardware
    if (t.radiusX > 1 || t.radiusY > 1) {
      bctx.beginPath();
      bctx.ellipse(x, y, t.radiusX, t.radiusY, 0, 0, Math.PI * 2);
      bctx.strokeStyle = 'rgba(255,255,255,0.3)';
      bctx.lineWidth = 1;
      bctx.stroke();
    }
  });

  // Bounding box
  if (bbox && (bbox.w > 5 || bbox.h > 5)) {
    bctx.strokeStyle = m.erase ? '#f72585aa' : '#ffffff55';
    bctx.lineWidth = 1;
    bctx.setLineDash([4, 4]);
    bctx.strokeRect(bbox.minX, bbox.minY, bbox.w, bbox.h);
    bctx.setLineDash([]);

    // Etiqueta área
    bctx.fillStyle = '#fff';
    bctx.font = '11px monospace';
    bctx.fillText(
      `${Math.round(bbox.w)}×${Math.round(bbox.h)} = ${Math.round(bbox.area)}px²`,
      bbox.minX + 4, bbox.minY - 4
    );
  }
}

// ─── Actualizar debug UI ─────────────────────────────────────────────────────
function updateDebug(touches) {
  const bbox   = getBBox(touches);
  const area   = bbox ? bbox.area : 0;
  const mode   = detectMode(area);
  const m      = MODES[mode];
  const { rx, ry } = getAvgRadius(touches);

  document.getElementById('d-count').textContent = touches.length;
  document.getElementById('d-area').textContent  = Math.round(area);
  document.getElementById('d-bbox').textContent  = bbox
    ? `${Math.round(bbox.w)} × ${Math.round(bbox.h)}`
    : '— × —';
  document.getElementById('d-radius').textContent = touches.length
    ? `${rx.toFixed(1)} / ${ry.toFixed(1)}`
    : '— / —';

  const mi = document.getElementById('mode-indicator');
  mi.textContent = m.label;
  mi.className   = m.cls;

  drawDebugOverlay(touches, bbox, mode);
  return { mode, bbox };
}

// ─── Touch events ────────────────────────────────────────────────────────────
dc.addEventListener('touchstart', e => {
  e.preventDefault();
  const { mode } = updateDebug(e.touches);
  Array.from(e.changedTouches).forEach(t => {
    paths[t.identifier] = { pos: canvasPos(t), mode };
  });
}, { passive: false });

dc.addEventListener('touchmove', e => {
  e.preventDefault();
  const { mode } = updateDebug(e.touches);

  Array.from(e.changedTouches).forEach(t => {
    const newPos = canvasPos(t);
    const entry  = paths[t.identifier];
    if (entry) {
      // Usa el modo actual (puede cambiar en medio del gesto)
      entry.mode = mode;
      drawStep(entry.pos, newPos, mode);
      entry.pos = newPos;
    } else {
      paths[t.identifier] = { pos: newPos, mode };
    }
  });
}, { passive: false });

dc.addEventListener('touchend', e => {
  e.preventDefault();
  Array.from(e.changedTouches).forEach(t => delete paths[t.identifier]);
  updateDebug(e.touches);
}, { passive: false });

dc.addEventListener('touchcancel', e => {
  Array.from(e.changedTouches).forEach(t => delete paths[t.identifier]);
  updateDebug(e.touches);
}, { passive: false });

// ─── Mouse fallback (desktop) ────────────────────────────────────────────────
let mouseDown = false, lastMouse = null;
dc.addEventListener('mousedown', e => {
  mouseDown = true;
  const rect = dc.getBoundingClientRect();
  lastMouse = { x: e.clientX - rect.left, y: e.clientY - rect.top };
});
dc.addEventListener('mousemove', e => {
  if (!mouseDown) return;
  const rect = dc.getBoundingClientRect();
  const pos  = { x: e.clientX - rect.left, y: e.clientY - rect.top };
  drawStep(lastMouse, pos, 'penThin');
  lastMouse = pos;
});
dc.addEventListener('mouseup', () => { mouseDown = false; lastMouse = null; });

// ─── Limpiar ─────────────────────────────────────────────────────────────────
document.getElementById('btn-clear').addEventListener('click', () => {
  const w = dc.width  / (window.devicePixelRatio || 1);
  const h = dc.height / (window.devicePixelRatio || 1);
  dctx.clearRect(0, 0, w, h);
});
</script>
</body>
</html>
