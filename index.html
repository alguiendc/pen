<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>pen-detector</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#111; color:#eee; font-family:monospace; height:100vh; display:flex; flex-direction:column; overflow:hidden; }

    #bar {
      background:#1a1a2e; padding:8px 12px;
      display:flex; align-items:center; gap:12px; flex-wrap:wrap;
      border-bottom:2px solid #0f3460; min-height:48px; user-select:none;
    }

    /* IR / Ink toggle */
    #mode-sel { display:flex; border:1px solid #333; border-radius:6px; overflow:hidden; }
    #mode-sel button {
      padding:4px 12px; background:#1a1a2e; color:#666;
      border:none; cursor:pointer; font-family:monospace; font-size:12px; font-weight:bold;
    }
    #mode-sel button.on { background:#4cc9f0; color:#000; }

    /* tool badge */
    #tool {
      padding:3px 12px; border-radius:20px; font-size:13px; font-weight:bold;
      background:#222; color:#555;
    }
    .t-penThin  { background:#0077b6 !important; color:#fff !important; }
    .t-penThick { background:#f8961e !important; color:#000 !important; }
    .t-eraser   { background:#f72585 !important; color:#fff !important; }

    #dbg { font-size:11px; color:#666; }

    button.plain {
      padding:4px 10px; background:#222; color:#aaa;
      border:1px solid #333; border-radius:6px; cursor:pointer; font-family:monospace; font-size:12px;
    }
    button.plain:hover { background:#333; }
    #btn-cfg { margin-left:auto; }
    #btn-cfg.on { background:#4cc9f0; color:#000; border-color:#4cc9f0; }

    /* canvas */
    #wrap { flex:1; position:relative; }
    canvas { position:absolute; inset:0; width:100%; height:100%; touch-action:none; }
    #cc { background:#1a1a2e; }
    #dc { z-index:1; }

    /* calibration panel */
    #cal {
      position:absolute; top:0; right:0; bottom:0; width:220px;
      background:#16213e; border-left:2px solid #0f3460;
      padding:12px; display:flex; flex-direction:column; gap:10px;
      overflow-y:auto; z-index:5;
      transform:translateX(100%); transition:transform .2s;
    }
    #cal.open { transform:translateX(0); }
    .cal-title { font-size:12px; color:#aaa; border-bottom:1px solid #0f3460; padding-bottom:6px; }
    .tool-row { background:#0d1b2a; border-radius:6px; padding:8px; display:flex; flex-direction:column; gap:5px; border:2px solid transparent; }
    .tool-row.active { border-color:#f72585; }
    .tool-label { font-size:11px; font-weight:bold; }
    .inputs { display:flex; gap:6px; }
    .inputs label { flex:1; display:flex; flex-direction:column; font-size:9px; color:#666; }
    .inputs input { background:#0a1525; border:1px solid #1a3a5a; color:#eee; font-family:monospace; font-size:13px; padding:3px 5px; border-radius:4px; }
    .btn-read { padding:4px 8px; border:none; border-radius:5px; background:#1a3a5a; color:#eee; cursor:pointer; font-family:monospace; font-size:11px; }
    .btn-read.rec { background:#f72585; color:#fff; }
    .btn-read:disabled { opacity:.3; }
    .live { font-size:10px; color:#4cc9f0; white-space:pre-line; min-height:32px; }
    #btn-reset { margin-top:auto; padding:5px; background:#2a1010; color:#f72585; border:1px solid #f7258533; border-radius:5px; cursor:pointer; font-size:11px; font-family:monospace; }
  </style>
</head>
<body>

<div id="bar">
  <div id="mode-sel">
    <button id="btn-ir" class="on">IR</button>
    <button id="btn-ink">Ink</button>
  </div>
  <div id="tool">Ninguno</div>
  <div id="dbg" style="font-size:10px;line-height:1.6">
    <span id="d1">pts:—</span> &nbsp;
    <span id="d2">metric:—</span> &nbsp;
    <span id="d3">rX:—</span> &nbsp;
    <span id="d4">rY:—</span> &nbsp;
    <span id="d5">√(rX²+rY²):—</span><br>
    <span id="d6">bbox W×H:—</span> &nbsp;
    <span id="d7">bboxArea:—</span>
  </div>
  <button class="plain" id="btn-clr">Limpiar</button>
  <button class="plain" id="btn-cfg">⚙ Calibrar</button>
  <span style="margin-left:auto;font-size:10px;color:#444">v0.7</span>
</div>

<div id="wrap">
  <canvas id="cc"></canvas>
  <canvas id="dc"></canvas>

  <div id="cal">
    <div class="cal-title">Umbrales IR (radio px)</div>

    <div class="tool-row" id="row-penThin">
      <div class="tool-label" style="color:#4cc9f0">● Lápiz fino</div>
      <div class="inputs">
        <label>min<input type="number" id="min-penThin" step="0.1" value="0"></label>
        <label>max<input type="number" id="max-penThin" step="0.1" value="1.2"></label>
      </div>
      <button class="btn-read" data-tool="penThin">▶ Leer</button>
      <div class="live" id="live-penThin"></div>
    </div>

    <div class="tool-row" id="row-penThick">
      <div class="tool-label" style="color:#f8961e">● Lápiz grueso</div>
      <div class="inputs">
        <label>min<input type="number" id="min-penThick" step="0.1" value="1.4"></label>
        <label>max<input type="number" id="max-penThick" step="0.1" value="2.8"></label>
      </div>
      <button class="btn-read" data-tool="penThick">▶ Leer</button>
      <div class="live" id="live-penThick"></div>
    </div>

    <div class="tool-row" id="row-eraser">
      <div class="tool-label" style="color:#f72585">● Palma</div>
      <div class="inputs">
        <label>min<input type="number" id="min-eraser" step="0.1" value="13"></label>
        <label>max<input type="number" id="max-eraser" step="0.1" value="20"></label>
      </div>
      <button class="btn-read" data-tool="eraser">▶ Leer</button>
      <div class="live" id="live-eraser"></div>
    </div>

    <button id="btn-reset">↺ Defaults</button>
  </div>
</div>

<script type="module">
import { PenDetector } from './pen-detector.js';

// ── canvas ────────────────────────────────────────────────────────────────
const wrap = document.getElementById('wrap');
const dc = document.getElementById('dc'), dctx = dc.getContext('2d');
const cc = document.getElementById('cc'), cctx = cc.getContext('2d');

function resize() {
  const dpr = devicePixelRatio || 1;
  const w = wrap.clientWidth, h = wrap.clientHeight;
  [dc, cc].forEach(c => {
    c.width = w * dpr; c.height = h * dpr;
    c.style.width = w + 'px'; c.style.height = h + 'px';
    c.getContext('2d').scale(dpr, dpr);
  });
}
resize();
window.addEventListener('resize', resize);

// ── detector ──────────────────────────────────────────────────────────────
let det = null, mode = 'ir', prev = null;

const STYLE = {
  penThin:  { w: 2,  color: '#4cc9f0' },
  penThick: { w: 14, color: '#f8961e' },
  eraser:   { w: 50, color: null      },
};

function start(m) {
  if (det) det.destroy();
  mode = m;
  prev = null;
  det = new PenDetector({ element: dc, mode: m });

  det.on('pendown', e => {
    setDebug(e);
    prev = { x: e.x, y: e.y };
  });

  det.on('penmove', e => {
    setDebug(e);
    if (prev) draw(prev, e);
    prev = { x: e.x, y: e.y };
  });

  det.on('penup', () => {
    prev = null;
    clearDebug();
  });
}

function draw(from, evt) {
  const s = STYLE[evt.tool];
  if (!s) return; // 'none' → don't draw
  dctx.beginPath();
  dctx.moveTo(from.x, from.y);
  dctx.lineTo(evt.x, evt.y);
  dctx.lineWidth = s.w * (0.6 + evt.pressure * 0.8);
  dctx.lineCap = dctx.lineJoin = 'round';
  if (s.color) {
    dctx.globalCompositeOperation = 'source-over';
    dctx.strokeStyle = s.color;
  } else {
    dctx.globalCompositeOperation = 'destination-out';
    dctx.strokeStyle = 'rgba(0,0,0,1)';
  }
  dctx.stroke();
  dctx.globalCompositeOperation = 'source-over';
}

// ── debug bar ─────────────────────────────────────────────────────────────
function setDebug(e) {
  const tb = document.getElementById('tool');
  tb.textContent = e.tool; tb.className = 't-' + e.tool;
  document.getElementById('d1').textContent = `pts:${e.pointCount}`;
  document.getElementById('d2').textContent = `metric:${(e.metric ?? 0).toFixed(2)}`;
  document.getElementById('d3').textContent = `rX:${(e.radiusX ?? 0).toFixed(2)}`;
  document.getElementById('d4').textContent = `rY:${(e.radiusY ?? 0).toFixed(2)}`;
  document.getElementById('d5').textContent = `√(rX²+rY²):${(e.radiusMag ?? 0).toFixed(2)}`;
  document.getElementById('d6').textContent = `bbox:${Math.round(e.bboxW??0)}×${Math.round(e.bboxH??0)}`;
  document.getElementById('d7').textContent = `bboxArea:${Math.round(e.bboxArea??0)}px²`;
}
function clearDebug() {
  document.getElementById('tool').textContent = 'Ninguno';
  document.getElementById('tool').className = '';
  ['d1','d2','d3','d4','d5','d6','d7'].forEach(id => {
    document.getElementById(id).textContent = document.getElementById(id).textContent.split(':')[0] + ':—';
  });
}

// ── mode buttons ──────────────────────────────────────────────────────────
document.getElementById('btn-ir').addEventListener('click', () => {
  document.getElementById('btn-ir').classList.add('on');
  document.getElementById('btn-ink').classList.remove('on');
  document.getElementById('btn-cfg').style.display = '';
  start('ir');
  syncInputs();
});
document.getElementById('btn-ink').addEventListener('click', () => {
  document.getElementById('btn-ink').classList.add('on');
  document.getElementById('btn-ir').classList.remove('on');
  document.getElementById('btn-cfg').style.display = 'none';
  document.getElementById('cal').classList.remove('open');
  document.getElementById('btn-cfg').classList.remove('on');
  start('ink');
});

// ── calibration panel ─────────────────────────────────────────────────────
let calTool = null, calMin = Infinity, calMax = -Infinity, calCount = 0;
const TOL = 0.2;

document.getElementById('btn-cfg').addEventListener('click', () => {
  document.getElementById('cal').classList.toggle('open');
  document.getElementById('btn-cfg').classList.toggle('on');
});

document.querySelectorAll('.btn-read').forEach(btn => {
  btn.addEventListener('click', () => {
    const tool = btn.dataset.tool;
    if (btn.classList.contains('rec')) {
      // save
      if (calCount > 0) {
        const newThr = {};
        newThr[tool] = {
          min: Math.max(0, parseFloat((calMin - TOL).toFixed(2))),
          max: parseFloat((calMax + TOL).toFixed(2)),
        };
        det.setThresholds(newThr);
        saveThresholds();
        syncInputs();
        document.getElementById('live-' + tool).textContent =
          `✓ ${newThr[tool].min} – ${newThr[tool].max}`;
      }
      calTool = null; calMin = Infinity; calMax = -Infinity; calCount = 0;
      btn.textContent = '▶ Leer'; btn.classList.remove('rec');
      document.getElementById('row-' + tool).classList.remove('active');
      document.querySelectorAll('.btn-read').forEach(b => b.disabled = false);
    } else {
      calTool = tool; calMin = Infinity; calMax = -Infinity; calCount = 0;
      btn.textContent = '■ Guardar'; btn.classList.add('rec');
      document.getElementById('row-' + tool).classList.add('active');
      document.getElementById('live-' + tool).textContent = 'Toca con el instrumento…';
      document.querySelectorAll('.btn-read').forEach(b => { if (b !== btn) b.disabled = true; });

      // hook into penmove to record metric during calibration
      det.off('penmove', recordCal);
      det.on('penmove', recordCal);
      det.off('pendown', recordCal);
      det.on('pendown', recordCal);
    }
  });
});

function recordCal(e) {
  if (!calTool) return;
  if (e.metric < calMin) calMin = e.metric;
  if (e.metric > calMax) calMax = e.metric;
  calCount++;
  document.getElementById('live-' + calTool).textContent =
    `actual: ${e.metric.toFixed(2)}\n` +
    `rango: ${calMin.toFixed(2)} – ${calMax.toFixed(2)}\n` +
    `(${calCount} lecturas)`;
  document.getElementById('min-' + calTool).value = Math.max(0, calMin - TOL).toFixed(2);
  document.getElementById('max-' + calTool).value = (calMax + TOL).toFixed(2);
}

// manual input edits
for (const tool of ['penThin', 'penThick', 'eraser']) {
  for (const b of ['min', 'max']) {
    document.getElementById(b + '-' + tool).addEventListener('input', () => {
      const v = parseFloat(document.getElementById(b + '-' + tool).value);
      if (!isNaN(v) && det) {
        const upd = {}; upd[tool] = { ...det.thresholds[tool], [b]: v };
        det.setThresholds(upd);
        saveThresholds();
      }
    });
  }
}

// ── persistence ───────────────────────────────────────────────────────────
function saveThresholds() {
  try { localStorage.setItem('pd-thr', JSON.stringify(det.thresholds)); } catch {}
}
function loadThresholds() {
  try {
    const d = JSON.parse(localStorage.getItem('pd-thr'));
    if (d?.penThin && d?.penThick && d?.eraser) return d;
  } catch {}
  return null;
}
function syncInputs() {
  if (!det || mode !== 'ir') return;
  const t = det.thresholds;
  for (const tool of ['penThin', 'penThick', 'eraser']) {
    document.getElementById('min-' + tool).value = t[tool].min;
    document.getElementById('max-' + tool).value = t[tool].max;
  }
}

document.getElementById('btn-reset').addEventListener('click', () => {
  det.setThresholds({ penThin:{min:0,max:1.2}, penThick:{min:1.4,max:2.8}, eraser:{min:13,max:20} });
  saveThresholds();
  syncInputs();
});

document.getElementById('btn-clr').addEventListener('click', () => {
  const w = dc.width / (devicePixelRatio||1), h = dc.height / (devicePixelRatio||1);
  dctx.clearRect(0, 0, w, h);
});

// ── init ──────────────────────────────────────────────────────────────────
const saved = loadThresholds();
start('ir');
if (saved) { det.setThresholds(saved); syncInputs(); }
</script>
</body>
</html>
