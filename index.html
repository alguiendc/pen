<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Pen Touch Detection</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      color: #eee;
      font-family: monospace;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #debug {
      background: #16213e;
      padding: 10px 16px;
      display: flex;
      gap: 20px;
      align-items: center;
      flex-wrap: wrap;
      border-bottom: 2px solid #0f3460;
      z-index: 10;
      user-select: none;
    }

    #debug .label {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
    }

    #debug .value {
      font-size: 22px;
      font-weight: bold;
    }

    #mode-indicator {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: bold;
      transition: all 0.15s;
    }

    .mode-none     { background: #333; color: #888; }
    .mode-pen-thin { background: #0077b6; color: #fff; }
    .mode-pen-thick{ background: #4cc9f0; color: #000; }
    .mode-eraser   { background: #f72585; color: #fff; }

    #touch-list {
      font-size: 11px;
      color: #aaa;
      max-width: 400px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    #btn-clear {
      margin-left: auto;
      padding: 6px 14px;
      background: #e63946;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-family: monospace;
    }

    canvas {
      flex: 1;
      display: block;
      touch-action: none;
      cursor: crosshair;
    }

    #cursor-indicator {
      position: fixed;
      pointer-events: none;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.5);
      transform: translate(-50%, -50%);
      transition: width 0.1s, height 0.1s, border-color 0.1s;
      display: none;
    }
  </style>
</head>
<body>

<div id="debug">
  <div>
    <div class="label">Puntos tocados</div>
    <div class="value" id="touch-count">0</div>
  </div>
  <div>
    <div class="label">Modo detectado</div>
    <div id="mode-indicator" class="mode-none">Ninguno</div>
  </div>
  <div>
    <div class="label">Tamaño brush</div>
    <div class="value" id="brush-size">—</div>
  </div>
  <div id="touch-list">Sin toques activos</div>
  <button id="btn-clear">Limpiar</button>
</div>

<canvas id="canvas"></canvas>
<div id="cursor-indicator"></div>

<script>
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const elCount = document.getElementById('touch-count');
  const elMode = document.getElementById('mode-indicator');
  const elSize = document.getElementById('brush-size');
  const elList = document.getElementById('touch-list');
  const cursor = document.getElementById('cursor-indicator');

  // Ajusta canvas al tamaño real
  function resize() {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.scale(dpr, dpr);
  }
  resize();
  window.addEventListener('resize', resize);

  // ── Configuración de umbrales ──────────────────────────────────────────────
  // Ajusta estos valores según tu pantalla táctil
  const THRESHOLDS = {
    penThin:  1,   // exactamente 1 punto → lápiz fino
    penThick: 2,   // 2–3 puntos          → lápiz grueso / dedo
    eraser:   4,   // 4+ puntos           → palma / borrador
  };

  const MODES = {
    none:     { label: 'Ninguno',      cls: 'mode-none',      size: 0,   color: null,      erase: false },
    penThin:  { label: 'Lápiz fino',   cls: 'mode-pen-thin',  size: 2,   color: '#4cc9f0', erase: false },
    penThick: { label: 'Lápiz grueso', cls: 'mode-pen-thick', size: 12,  color: '#f8961e', erase: false },
    eraser:   { label: 'Borrador',     cls: 'mode-eraser',    size: 60,  color: null,      erase: true  },
  };

  function detectMode(count) {
    if (count === 0)                          return 'none';
    if (count === THRESHOLDS.penThin)         return 'penThin';
    if (count < THRESHOLDS.eraser)            return 'penThick';
    return 'eraser';
  }

  // ── Estado de dibujo ───────────────────────────────────────────────────────
  const paths = {};   // un path por cada touch.identifier

  function getCanvasPos(touch) {
    const rect = canvas.getBoundingClientRect();
    return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
  }

  function drawStep(fromPos, toPos, mode) {
    const m = MODES[mode];
    ctx.beginPath();
    ctx.moveTo(fromPos.x, fromPos.y);
    ctx.lineTo(toPos.x, toPos.y);
    ctx.lineWidth = m.size;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    if (m.erase) {
      ctx.globalCompositeOperation = 'destination-out';
      ctx.strokeStyle = 'rgba(0,0,0,1)';
    } else {
      ctx.globalCompositeOperation = 'source-over';
      ctx.strokeStyle = m.color;
    }
    ctx.stroke();
    ctx.globalCompositeOperation = 'source-over';
  }

  // ── Actualiza debug UI ─────────────────────────────────────────────────────
  function updateDebug(touches) {
    const count = touches.length;
    const modeName = detectMode(count);
    const m = MODES[modeName];

    elCount.textContent = count;
    elMode.textContent = m.label;
    elMode.className = m.cls;
    elSize.textContent = m.size > 0 ? m.size + 'px' : '—';

    if (count === 0) {
      elList.textContent = 'Sin toques activos';
    } else {
      const info = Array.from(touches).map(t =>
        `#${t.identifier} (${Math.round(t.clientX)},${Math.round(t.clientY)})`
      ).join('  |  ');
      elList.textContent = info;
    }
  }

  function showCursor(x, y, mode) {
    const m = MODES[mode];
    const size = Math.max(m.size, 4);
    cursor.style.display = 'block';
    cursor.style.width  = size + 'px';
    cursor.style.height = size + 'px';
    cursor.style.left   = x + 'px';
    cursor.style.top    = y + 'px';
    cursor.style.borderColor = m.erase ? '#f72585' : (m.color || '#fff');
  }

  function hideCursor() { cursor.style.display = 'none'; }

  // ── Eventos táctiles ───────────────────────────────────────────────────────
  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    const count = e.touches.length;
    const mode = detectMode(count);

    // Si cambia a borrador, cancela paths de lápiz activos y viceversa
    if (mode === 'eraser') {
      Object.keys(paths).forEach(id => delete paths[id]);
    }

    Array.from(e.changedTouches).forEach(t => {
      paths[t.identifier] = { pos: getCanvasPos(t), mode };
    });

    updateDebug(e.touches);
  }, { passive: false });

  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    const count = e.touches.length;
    const mode = detectMode(count);

    Array.from(e.changedTouches).forEach(t => {
      const newPos = getCanvasPos(t);
      const entry = paths[t.identifier];
      if (entry) {
        drawStep(entry.pos, newPos, entry.mode);
        entry.pos = newPos;
      }
      // Cursor visual en el primer toque
      if (t === e.changedTouches[0]) showCursor(t.clientX, t.clientY, mode);
    });

    updateDebug(e.touches);
  }, { passive: false });

  canvas.addEventListener('touchend', e => {
    e.preventDefault();
    Array.from(e.changedTouches).forEach(t => delete paths[t.identifier]);
    updateDebug(e.touches);
    if (e.touches.length === 0) hideCursor();
  }, { passive: false });

  canvas.addEventListener('touchcancel', e => {
    Array.from(e.changedTouches).forEach(t => delete paths[t.identifier]);
    updateDebug(e.touches);
    hideCursor();
  }, { passive: false });

  // ── Fallback mouse (para probar en desktop) ────────────────────────────────
  let mouseDown = false;
  let lastMousePos = null;

  canvas.addEventListener('mousedown', e => {
    mouseDown = true;
    const rect = canvas.getBoundingClientRect();
    lastMousePos = { x: e.clientX - rect.left, y: e.clientY - rect.top };
    elCount.textContent = '1 (mouse)';
    elMode.textContent = MODES.penThin.label;
    elMode.className = MODES.penThin.cls;
    elSize.textContent = MODES.penThin.size + 'px';
    elList.textContent = `mouse (${Math.round(e.clientX)},${Math.round(e.clientY)})`;
  });

  canvas.addEventListener('mousemove', e => {
    if (!mouseDown) return;
    const rect = canvas.getBoundingClientRect();
    const pos = { x: e.clientX - rect.left, y: e.clientY - rect.top };
    drawStep(lastMousePos, pos, 'penThin');
    lastMousePos = pos;
    elList.textContent = `mouse (${Math.round(e.clientX)},${Math.round(e.clientY)})`;
  });

  canvas.addEventListener('mouseup', () => {
    mouseDown = false; lastMousePos = null;
    elCount.textContent = '0'; elMode.textContent = 'Ninguno';
    elMode.className = 'mode-none'; elSize.textContent = '—';
    elList.textContent = 'Sin toques activos';
  });

  // ── Limpiar canvas ─────────────────────────────────────────────────────────
  document.getElementById('btn-clear').addEventListener('click', () => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  });
</script>
</body>
</html>
